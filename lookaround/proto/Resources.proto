syntax = "proto3";
package streetlevel;

message Resources {
  repeated TileSet tile_set = 2;
  // don't care about the rest of this
}

message TileSet {
  string base_url = 1;
  string multi_tile_url = 2;
  TileSetStyle style = 3;
  repeated TileSetVersion valid_version = 5;
  int32 scale = 6;
  int32 size = 7;
  string localization_url = 9;
  repeated Language supported_language = 10;
  int32 multi_tile_url_uses_status_codes = 11;
  TileSetUpdateBehavior update_behavior = 12;
  repeated CountryRegionTuple country_region_allowlist = 13;
  ChecksumType checksum_type = 14;
  uint32 data_set = 15;
  RequestStyle request_style = 16;
  bool use_auth_proxy = 17;
  bool supports_multipath_tcp = 18;
  uint32 alternative_multipath_tcp_port = 19;
  string device_sku_allowlist = 20;
}

message CountryRegionTuple {
  string country_code = 1;
  string region = 2;
}

message Language {
  int32 identifier = 1;
  repeated string language = 2;
}

message TileSetVersion {
  int32 identifier = 1;
  repeated TileSetRegion available_tiles = 2;
  int32 time_to_live_seconds = 3;
  repeated GenericTile generic_tiles = 4;
  int32 supported_languages_version = 5;
}

message TileSetRegion {
  uint32 unknown1 = 1;
  uint32 unknown2 = 2;
  uint32 unknown3 = 3;
  uint32 unknown4 = 4;
  uint32 min_zoom = 5;
  uint32 max_zoom = 6;
}

message GenericTile {
  uint32 unknown1 = 1;
  uint32 unknown2 = 2;
  uint32 unknown3 = 3;
}

enum RequestStyle {
  REQUEST_STYLE_LEGACY = 0;
  REQUEST_STYLE_HEADER_PARAMS_VERSION_BASED_HMAC_AUTH = 1;
}

enum TileSetUpdateBehavior {
  TILE_UPDATE_BEHAVIOR_FLUSH = 0;
  TILE_UPDATE_BEHAVIOR_ETAG = 1;
}

enum ChecksumType {
  CHECKSUM_TYPE_NONE = 0;
  CHECKSUM_TYPE_APPEND_MD5 = 1;
}

enum TileSetStyle {
  RASTER_STANDARD = 0;
  VECTOR_STANDARD = 1;
  VECTOR_TRAFFIC_SEGMENTS_FOR_RASTER = 2;
  VECTOR_TRAFFIC_INCIDENTS_FOR_RASTER = 3;
  VECTOR_TRAFFIC_SEGMENTS_AND_INCIDENTS_FOR_RASTER = 4;
  RASTER_STANDARD_BACKGROUND = 5;
  RASTER_HYBRID = 6;
