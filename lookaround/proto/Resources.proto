  FLYOVER_C3M_ASTC_TEXTURE = 44;
  RASTER_SATELLITE_ASTC = 45;
  RASTER_HYBRID_ROADS_AND_LABELS = 46;
  VECTOR_TRANSIT_SELECTION = 47;
  VECTOR_COVERAGE = 48;
