  VECTOR_REALISTIC = 18;
  VECTOR_LEGACY_REALISTIC = 19;
  VECTOR_ROADS = 20;
  RASTER_VEGETATION = 21;
  VECTOR_TRAFFIC_SKELETON = 22;
  RASTER_COASTLINE_MASK = 23;
